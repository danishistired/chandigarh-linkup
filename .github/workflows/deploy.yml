name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# adjust this workflow to your host (cloudflare pages, vercel, netlify, etc).
# the build command and output directory below assume the default
# TanStack Start + Nitro Cloudflare target this template ships with.
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
